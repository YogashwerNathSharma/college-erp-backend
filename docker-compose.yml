version: "3.8"

services:
  mongodb:
    image: mongo:7
    container_name: college-erp-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin123
      MONGO_INITDB_DATABASE: college_erp
    volumes:
      - mongo_data:/data/db
    networks:
      - erp-network

  redis:
    image: redis:7-alpine
    container_name: college-erp-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --requirepass redis123
    volumes:
      - redis_data:/data
    networks:
      - erp-network

  mongo-express:
    image: mongo-express
    container_name: college-erp-mongo-ui
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: admin
      ME_CONFIG_MONGODB_ADMINPASSWORD: admin123
      ME_CONFIG_MONGODB_URL: mongodb://admin:admin123@mongodb:27017/
    depends_on:
      - mongodb
    networks:
      - erp-network

volumes:
  mongo_data:
  redis_data:

networks:
  erp-network:
    driver: bridge
